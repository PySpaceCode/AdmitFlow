services:
  - type: web
    name: admission-ai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.1 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: admission-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: admission-db
    plan: free
